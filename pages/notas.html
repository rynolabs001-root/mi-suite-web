<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Notes — My Suite</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/notas.css">
</head>
<body>

<nav>
  <strong>My Suite</strong>
  <div class="nav-right">
    <a href="../index.html">Home</a>
    <a href="calendario.html">Calendar</a>
    <a href="peliculas.html">Movies</a>
    <a href="#" onclick="cerrarSesion()">Sign out</a>
  </div>
</nav>

<div class="notas-layout" id="notas-layout">

  <!-- ==================== SIDEBAR ==================== -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <input class="sidebar-search" id="sidebar-search"
        placeholder="🔍 Search notes..."
        oninput="buscarGlobal(this.value)">
    </div>

    <!-- NOTEBOOKS -->
    <div class="libretas-wrap">
      <div style="display:flex;align-items:center;padding:6px 12px 3px;gap:6px;flex-shrink:0;">
        <span style="font-size:14px;">📚</span>
        <span style="font-size:11px;font-weight:600;color:var(--text2);flex:1;">Notebooks</span>
        <span class="sidebar-section-badge blue" id="libretas-count">0</span>
        <button class="sidebar-section-add" onclick="nuevaLibreta()" title="New notebook">+</button>
      </div>
      <ul class="libretas-list" id="libretas-list">
        <li class="libreta-item loading">Loading...</li>
      </ul>
    </div>

    <div class="sidebar-divider"></div>

    <!-- TO-DO'S -->
    <div class="todos-summary-wrap">

      <!-- To-Do's section -->
      <div class="sidebar-section" onclick="abrirTodosGlobalModo('list')">
        <span class="sidebar-section-icon">✅</span>
        <span class="sidebar-section-title">To-Do's</span>
        <span class="sidebar-section-badge warn" id="todos-total-badge">0</span>
      </div>
      <div class="summary-card" id="todos-list-summary">
        <div class="summary-row" onclick="abrirTodosGlobalModo('list')">
          <div class="summary-dot" style="background:#ff9f0a;"></div>
          <span class="summary-name">Pending</span>
          <span class="summary-count" id="todos-pending-count">0</span>
        </div>
        <div class="summary-row" onclick="abrirTodosGlobalModo('list')">
          <div class="summary-dot" style="background:#34c759;"></div>
          <span class="summary-name">Done</span>
          <span class="summary-count" id="todos-done-count">0</span>
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <!-- Kanban section -->
      <div class="sidebar-section" onclick="abrirTodosGlobalModo('kanban')">
        <span class="sidebar-section-icon">📋</span>
        <span class="sidebar-section-title">Kanban</span>
        <span class="sidebar-section-badge blue" id="kanban-total-badge">0</span>
      </div>
      <div class="summary-card" id="kanban-cols-summary">
        <div style="padding:8px 10px;font-size:11px;color:var(--text3);text-align:center;">Loading...</div>
      </div>

    </div>

    <div class="sidebar-divider"></div>

    <!-- TRASH -->
    <div class="papelera-wrap">
      <div class="papelera-item" onclick="abrirPapelera()">
        <span class="papelera-label">🗑 Trash</span>
        <span class="papelera-count" id="papelera-count">0</span>
      </div>
    </div>

    <div class="sidebar-footer">
      <span class="sidebar-footer-label">Dark Mode</span>
      <div class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">
        <div class="theme-toggle-thumb"></div>
      </div>
    </div>

  </aside>

  <div class="resizer" id="resizer-1"></div>

  <!-- ==================== NOTES PANEL ==================== -->
  <section class="notas-panel" id="notas-panel">
    <div class="notas-panel-header">
      <span class="notas-panel-title" id="libreta-nombre">Select a notebook</span>
      <div class="notas-panel-actions">
        <input type="text" id="buscar-notas"
          placeholder="Search in notebook..."
          class="input-buscar">
        <select id="ordenar-notas" onchange="ordenarNotas(this.value)">
          <option value="updated_at">Last modified</option>
          <option value="created_at">Date created</option>
          <option value="sort_order">Custom order</option>
        </select>
      </div>
      <div class="notas-panel-subactions">
        <button class="btn btn-primary btn-small" onclick="nuevaNota()">+ Note</button>
        <button class="panel-attach-btn" onclick="abrirAttachmentsLibreta()">📎 Attachments</button>
      </div>
    </div>
    <ul class="notas-list" id="notas-list">
      <li class="nota-empty">Select a notebook to see its notes.</li>
    </ul>
  </section>

  <div class="resizer" id="resizer-2"></div>

  <!-- ==================== EDITOR ==================== -->
  <section class="editor-panel" id="editor-panel">

    <!-- Attachments overlay -->
    <div class="attachments-screen" id="attachments-screen">
      <div class="attachments-header">
        <span class="attachments-title" id="attachments-title">Attachments</span>
        <button onclick="cerrarAttachments()"
          style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--text3);">✕</button>
      </div>
      <div class="attachments-body" id="attachments-body">
        <div class="attachments-empty">No attachments yet.</div>
      </div>
      <div class="attachments-upload">
        <button class="upload-btn" onclick="subirAttachment()">+ Add attachment</button>
      </div>
    </div>

    <div class="editor-placeholder" id="editor-placeholder">
      <p>Select or create a note to get started.</p>
    </div>

    <div class="editor-contenido" id="editor-contenido" style="display:none;">

      <div class="editor-toolbar">
        <button onclick="formatear('bold')" title="Bold (Ctrl+B)"><b>B</b></button>
        <button onclick="formatear('italic')" title="Italic (Ctrl+I)"><i>I</i></button>
        <button onclick="formatear('underline')" title="Underline (Ctrl+U)"><u>U</u></button>
        <button onclick="highlight('yellow')" class="hl-yellow" title="Highlight yellow">A</button>
        <button onclick="highlight('pink')" class="hl-pink" title="Highlight pink">A</button>
        <span class="toolbar-sep">|</span>
        <button onclick="formatear('insertUnorderedList')" title="Bullet list">•</button>
        <span class="toolbar-sep">|</span>
        <button onclick="deshacer()" title="Undo (Ctrl+Z)">↩</button>
        <button onclick="verVersiones()" title="Version history">🕐</button>
        <span class="toolbar-sep">|</span>
        <div class="color-btn-wrap">
          <button onclick="toggleColorPickerEditor()" title="Note color" id="btn-color">🎨</button>
          <div class="color-picker-popup" id="color-picker-editor">
            <div class="color-picker-label">Note color</div>
            <div class="color-swatches" id="color-swatches-editor"></div>
          </div>
        </div>
        <button onclick="eliminarNota()" title="Delete note" class="btn-danger-icon">🗑</button>
      </div>

      <input type="text" id="nota-titulo" class="editor-titulo"
        placeholder="Note title"
        oninput="window._hayaCambios = true">

      <div id="nota-contenido" class="editor-area" contenteditable="true"
        onkeydown="atajosTeclado(event)"
        oninput="onContenidoChange()">
      </div>

      <div class="editor-footer">
        <span id="nota-fecha" class="nota-fecha"></span>
        <div class="editor-footer-actions">
          <button class="btn btn-small" onclick="abrirAttachmentsNota()">📎 Attachments</button>
          <button class="btn btn-small" onclick="abrirRecordatorio()">⏰ Reminder</button>
          <button class="btn btn-primary btn-small" onclick="guardarNota()">Save</button>
        </div>
      </div>

    </div>
  </section>

  <div class="resizer" id="resizer-3" style="display:none;"></div>

  <!-- ==================== TO-DO'S PANEL ==================== -->
  <section class="todos-panel" id="todos-panel">
    <div class="todos-header">
      <span class="todos-title" id="todos-panel-title">To-Do's</span>
      <div class="todos-header-actions">
        <div class="mode-tabs">
          <button class="mode-tab active" id="tab-list" onclick="setTodosMode('list')">List</button>
          <button class="mode-tab" id="tab-kanban" onclick="setTodosMode('kanban')">Kanban</button>
        </div>
        <div class="todos-icon-btns">
          <button onclick="verVersionesTodos()" title="Version history" class="todos-icon-btn">🕐</button>
        </div>
      </div>
    </div>
    <div class="todos-body" id="todos-body"></div>
    <div class="todo-add" id="todo-add-bar">
      <input class="todo-input" id="todo-input" placeholder="Add a task..."
        onkeydown="if(event.key==='Enter') agregarTodo()">
      <button class="todo-add-btn" onclick="agregarTodo()">+</button>
    </div>
  </section>

</div>

<nav class="mobile-nav" id="mobile-nav" style="display:none;"></nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<script src="../js/todos.js"></script>
<script src="../js/notas.js"></script>
<script src="../js/resizer.js"></script>
<script src="../js/mobile.js"></script>
<script>
  (async () => {
    const sesion = await verificarSesion()
    if (!sesion) window.location.href = 'login.html'
    else iniciarNotas(sesion)
  })()
</script>

</body>
</html>
