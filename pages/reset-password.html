<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Mi Suite Web</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
    <div style="width:100%;max-width:400px;">

      <!-- Logo -->
      <p style="text-align:center;font-size:11px;font-weight:600;letter-spacing:0.08em;color:var(--text3);text-transform:uppercase;margin-bottom:24px;">Mi Suite Web</p>

      <!-- Card: solicitar reset -->
      <div class="card" id="card-solicitar">
        <h2 style="font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px;">Forgot your password?</h2>
        <p style="font-size:14px;color:var(--text3);margin-bottom:24px;line-height:1.6;">Enter your email address and we'll send you a link to reset your password.</p>

        <div id="msg-error-s" class="msg-error" style="display:none;"></div>
        <div id="msg-ok-s" class="msg-ok" style="display:none;"></div>

        <label style="font-size:12px;font-weight:500;color:var(--text3);display:block;margin-bottom:6px;">Email address</label>
        <input type="email" id="email-reset" placeholder="you@example.com" style="margin-bottom:16px;">

        <button class="btn btn-primary" style="width:100%;" onclick="solicitarReset()">Send reset link</button>

        <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text3);">
          <a href="login.html" style="color:var(--accent);text-decoration:none;">Back to sign in</a>
        </p>
      </div>

      <!-- Card: nueva contraseña -->
      <div class="card" id="card-nueva" style="display:none;">
        <h2 style="font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px;">Choose a new password</h2>
        <p style="font-size:14px;color:var(--text3);margin-bottom:24px;line-height:1.6;">Your new password must be at least 8 characters long.</p>

        <div id="msg-error-n" class="msg-error" style="display:none;"></div>
        <div id="msg-ok-n" class="msg-ok" style="display:none;"></div>

        <label style="font-size:12px;font-weight:500;color:var(--text3);display:block;margin-bottom:6px;">New password</label>
        <input type="password" id="nueva-password" placeholder="Minimum 8 characters" style="margin-bottom:12px;">

        <label style="font-size:12px;font-weight:500;color:var(--text3);display:block;margin-bottom:6px;">Confirm new password</label>
        <input type="password" id="confirmar-password" placeholder="Repeat your password" style="margin-bottom:16px;">

        <button class="btn btn-primary" style="width:100%;" onclick="actualizarPassword()">Update password</button>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/app.js"></script>
  <script>
    // Detectar si viene del link de reset en el email
    const hash = window.location.hash
    if (hash && hash.includes('type=recovery')) {
      document.getElementById('card-solicitar').style.display = 'none'
      document.getElementById('card-nueva').style.display = 'block'
    }

    async function solicitarReset() {
      const email = document.getElementById('email-reset').value.trim()
      const errEl = document.getElementById('msg-error-s')
      const okEl = document.getElementById('msg-ok-s')

      errEl.style.display = 'none'
      okEl.style.display = 'none'

      if (!email) {
        errEl.textContent = 'Please enter your email address.'
        errEl.style.display = 'block'
        return
      }

      const { error } = await db.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/pages/reset-password.html'
      })

      if (error) {
        errEl.textContent = 'Something went wrong. Please try again.'
        errEl.style.display = 'block'
      } else {
        okEl.textContent = 'Check your email — we sent you a reset link.'
        okEl.style.display = 'block'
        document.getElementById('email-reset').value = ''
      }
    }

    async function actualizarPassword() {
      const nueva = document.getElementById('nueva-password').value
      const confirmar = document.getElementById('confirmar-password').value
      const errEl = document.getElementById('msg-error-n')
      const okEl = document.getElementById('msg-ok-n')

      errEl.style.display = 'none'
      okEl.style.display = 'none'

      if (nueva.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.'
        errEl.style.display = 'block'
        return
      }

      if (nueva !== confirmar) {
        errEl.textContent = 'Passwords do not match.'
        errEl.style.display = 'block'
        return
      }

      const { error } = await db.auth.updateUser({ password: nueva })

      if (error) {
        errEl.textContent = 'Could not update password. Please request a new reset link.'
        errEl.style.display = 'block'
      } else {
        okEl.textContent = 'Password updated successfully!'
        okEl.style.display = 'block'
        setTimeout(() => window.location.href = 'login.html', 2000)
      }
    }
  </script>

</body>
</html>
